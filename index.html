<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>경북·경남 누수탐지 플랫폼</title>

    <link rel="stylesheet" href="css/style.css">
</head>

<body>

<header class="header">

    <div class="container">

        <h1>경북·경남 누수탐지</h1>

        <p>
            믿을 수 있는 누수탐지 업체를 쉽고 빠르게 찾아보세요.
        </p>

    </div>

</header>

<section class="search">

    <div class="container">

        <input
            type="text"
            placeholder="지역명을 입력하세요. (예: 포항)"
        >

        <button>검색</button>

    </div>

</section>

<section class="region">

    <div class="container">

        <h2>📍 경북</h2>

        <div class="city-list">

            <button>포항</button>
            <button>경주</button>
            <button>영덕</button>
            <button>구미</button>
            <button>안동</button>
            <button>김천</button>

        </div>

        <h2>📍 경남</h2>

        <div class="city-list">

            <button>창원</button>
            <button>김해</button>
            <button>양산</button>
            <button>거제</button>
            <button>진주</button>
            <button>통영</button>

        </div>

    </div>

</section>

<section class="recommend">

    <div class="container">

        <h2>🔥 추천 누수업체</h2>

        <p>곧 등록될 예정입니다.</p>

    </div>

</section>

<script src="js/script.js"></script>

</body>
</html>
